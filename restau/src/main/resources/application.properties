spring.application.name=restau

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=mySecretKey1234567890123456789012345678901234567890
app.jwt.expiration.ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# LOGGING
logging.level.com.restaurant=DEBUG